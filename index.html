<!DOCTYPE html>
<html lang="de" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wilmas Spielesammlung</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1b0d;
      color: #ffffff;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }
    h1 {
      font-size: 2.4rem;
      color: #f5e642;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .subtitle {
      font-size: 1rem;
      color: #52b788;
      margin-bottom: 48px;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      max-width: 960px;
      width: 100%;
    }
    .card {
      background: #1b4332;
      border: 2px solid #52b788;
      border-radius: 12px;
      width: 260px;
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .card:hover {
      background: #2c5f2e;
      border-color: #f5e642;
      transform: translateY(-3px);
    }
    .card-emoji { font-size: 3rem; line-height: 1; }
    .card-title { font-size: 1.25rem; font-weight: bold; color: #f5e642; }
    .card-desc  { font-size: 0.9rem; color: #aed9b8; text-align: center; }
    .card-btn {
      margin-top: 8px;
      background: #2c5f2e;
      border: 1px solid #52b788;
      border-radius: 6px;
      color: #ffffff;
      font-size: 0.95rem;
      padding: 7px 22px;
      cursor: pointer;
    }
    .card:hover .card-btn {
      background: #3d7a25;
      border-color: #f5e642;
    }
    .lang-toggle {
      position: fixed;
      top: 14px;
      right: 16px;
      display: flex;
      gap: 6px;
    }
    .lang-btn {
      background: #1b4332;
      border: 1px solid #52b788;
      border-radius: 5px;
      color: #aed9b8;
      font-size: 0.85rem;
      padding: 4px 10px;
      cursor: pointer;
    }
    .lang-btn.active {
      background: #2c5f2e;
      border-color: #f5e642;
      color: #f5e642;
      font-weight: bold;
    }
    .lang-btn:hover { border-color: #f5e642; color: #f5e642; }
    .card-platforms {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .platform-badge {
      font-size: 0.75rem;
      padding: 2px 7px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .platform-badge.supported {
      background: #2c5f2e;
      border: 1px solid #52b788;
      color: #aed9b8;
    }
    .platform-badge.unsupported {
      background: #1a2e1a;
      border: 1px solid #2e4a2e;
      color: #3d5c3d;
    }
    .platform-badge.current {
      border-color: #f5e642;
      color: #f5e642;
    }
    .card.platform-disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
      border-color: #2e4a2e;
    }
    .card.platform-disabled .card-title { color: #aed9b8; }
    .card.platform-disabled .card-btn { display: none; }
    .platform-unavailable {
      font-size: 0.75rem;
      color: #e63946;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="lang-toggle">
    <button class="lang-btn" id="btn-de" onclick="setLang('de')">🇩🇪 DE</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇬🇧 EN</button>
  </div>

  <h1 id="portal-heading"></h1>
  <p class="subtitle" id="portal-subtitle"></p>

  <div class="grid">
    <a class="card" href="./pflanzenwelt/index.html" data-supports-browser="true" data-supports-mobile="true">
      <div class="card-emoji">🌿</div>
      <div class="card-title" id="card-pf-title"></div>
      <div class="card-desc"  id="card-pf-desc"></div>
      <div class="card-btn"   id="card-pf-btn"></div>
      <div class="card-platforms">
        <span class="platform-badge supported" id="pf-badge-browser">🖥️ Browser</span>
        <span class="platform-badge supported" id="pf-badge-mobile">📱 Mobile</span>
      </div>
      <div class="platform-unavailable" id="card-pf-unavail" style="display:none;"></div>
    </a>
    <a class="card" href="./agentenfunk/index.html" data-supports-browser="true" data-supports-mobile="true">
      <div class="card-emoji">📡</div>
      <div class="card-title" id="card-af-title"></div>
      <div class="card-desc"  id="card-af-desc"></div>
      <div class="card-btn"   id="card-af-btn"></div>
      <div class="card-platforms">
        <span class="platform-badge supported" id="af-badge-browser">🖥️ Browser</span>
        <span class="platform-badge supported" id="af-badge-mobile">📱 Mobile</span>
      </div>
      <div class="platform-unavailable" id="card-af-unavail" style="display:none;"></div>
    </a>
    <a class="card" href="./weltreise/index.html" data-supports-browser="true" data-supports-mobile="true">
      <div class="card-emoji">🌍</div>
      <div class="card-title" id="card-wt-title"></div>
      <div class="card-desc"  id="card-wt-desc"></div>
      <div class="card-btn"   id="card-wt-btn"></div>
      <div class="card-platforms">
        <span class="platform-badge supported" id="wt-badge-browser">🖥️ Browser</span>
        <span class="platform-badge supported" id="wt-badge-mobile">📱 Mobile</span>
      </div>
      <div class="platform-unavailable" id="card-wt-unavail" style="display:none;"></div>
    </a>
    <a class="card" href="./buchstabengeist/index.html" data-supports-browser="true" data-supports-mobile="true">
      <div class="card-emoji">👻</div>
      <div class="card-title" id="card-bg-title"></div>
      <div class="card-desc"  id="card-bg-desc"></div>
      <div class="card-btn"   id="card-bg-btn"></div>
      <div class="card-platforms">
        <span class="platform-badge supported" id="bg-badge-browser">🖥️ Browser</span>
        <span class="platform-badge supported" id="bg-badge-mobile">📱 Mobile</span>
      </div>
      <div class="platform-unavailable" id="card-bg-unavail" style="display:none;"></div>
    </a>
    <a class="card" href="./irrlichter/index.html" data-supports-browser="true" data-supports-mobile="true">
      <div class="card-emoji">🔦</div>
      <div class="card-title" id="card-il-title"></div>
      <div class="card-desc"  id="card-il-desc"></div>
      <div class="card-btn"   id="card-il-btn"></div>
      <div class="card-platforms">
        <span class="platform-badge supported" id="il-badge-browser">🖥️ Browser</span>
        <span class="platform-badge supported" id="il-badge-mobile">📱 Mobile</span>
      </div>
      <div class="platform-unavailable" id="card-il-unavail" style="display:none;"></div>
    </a>
    <!-- add more cards here -->
  </div>

  <script>
    var isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

    var PORTAL_STRINGS = {
      de: {
        heading:    '🎮 Wilmas Spielesammlung',
        subtitle:   'Wähle ein Spiel!',
        pfTitle:    'Pflanzenwelt',
        pfDesc:     'Fange alle 8 Pflanzen-Kreaturen!',
        afTitle:    'Agentenfunk',
        afDesc:     'Lerne Morsecode als Spionage-Funker!',
        wtTitle:    'Weltreise',
        wtDesc:     'Bereise die Welt und lerne Geografie!',
        bgTitle:    'Buchstabengeist',
        bgDesc:     'Fresse die Buchstabengeister in der richtigen Reihenfolge!',
        ilTitle:    'Irrlichter',
        ilDesc:     'Duell im Labyrinth! Finde das Irrlicht vor deinem Gegner!',
        play:       'Spielen →',
        unavailMobile:  '⚠ Nicht für Mobilgeräte verfügbar',
        unavailBrowser: '⚠ Nicht für Desktop verfügbar'
      },
      en: {
        heading:    '🎮 Wilma\'s Game Collection',
        subtitle:   'Choose a game!',
        pfTitle:    'Plant World',
        pfDesc:     'Catch all 8 plant creatures!',
        afTitle:    'Agentenfunk',
        afDesc:     'Learn Morse code as a Cold War spy operator!',
        wtTitle:    'World Tour',
        wtDesc:     'Travel the world and learn geography!',
        bgTitle:    'Buchstabengeist',
        bgDesc:     'Eat the letter ghosts in the right order to spell words!',
        ilTitle:    'Irrlichter',
        ilDesc:     'Labyrinth duel! Find the will-o\'-wisp before your opponent!',
        play:       'Play →',
        unavailMobile:  '⚠ Not available on mobile',
        unavailBrowser: '⚠ Not available on desktop'
      }
    };

    function setLang(lang) {
      localStorage.setItem('pgame_lang', lang);
      render(lang);
    }

    function applyPlatform() {
      var cards = document.querySelectorAll('.card[data-supports-browser]');
      for (var i = 0; i < cards.length; i++) {
        var card = cards[i];
        var supportsMobile  = card.getAttribute('data-supports-mobile')  === 'true';
        var supportsBrowser = card.getAttribute('data-supports-browser') === 'true';
        var supported = isMobile ? supportsMobile : supportsBrowser;

        // Highlight the current platform's badge
        var browserBadge = card.querySelector('[id$="-badge-browser"]');
        var mobileBadge  = card.querySelector('[id$="-badge-mobile"]');
        if (browserBadge && !isMobile) browserBadge.classList.add('current');
        if (mobileBadge  && isMobile)  mobileBadge.classList.add('current');

        if (!supported) {
          card.classList.add('platform-disabled');
          card.removeAttribute('href');
          var unavail = card.querySelector('[id$="-unavail"]');
          if (unavail) unavail.style.display = '';
        }
      }
    }

    function render(lang) {
      var s = PORTAL_STRINGS[lang];
      document.getElementById('html-root').lang              = lang;
      document.getElementById('portal-heading').textContent  = s.heading;
      document.getElementById('portal-subtitle').textContent = s.subtitle;
      document.getElementById('card-pf-title').textContent   = s.pfTitle;
      document.getElementById('card-pf-desc').textContent    = s.pfDesc;
      document.getElementById('card-pf-btn').textContent     = s.play;
      document.getElementById('card-af-title').textContent   = s.afTitle;
      document.getElementById('card-af-desc').textContent    = s.afDesc;
      document.getElementById('card-af-btn').textContent     = s.play;
      document.getElementById('card-wt-title').textContent   = s.wtTitle;
      document.getElementById('card-wt-desc').textContent    = s.wtDesc;
      document.getElementById('card-wt-btn').textContent     = s.play;
      document.getElementById('card-bg-title').textContent   = s.bgTitle;
      document.getElementById('card-bg-desc').textContent    = s.bgDesc;
      document.getElementById('card-bg-btn').textContent     = s.play;
      document.getElementById('card-il-title').textContent   = s.ilTitle;
      document.getElementById('card-il-desc').textContent    = s.ilDesc;
      document.getElementById('card-il-btn').textContent     = s.play;
      document.getElementById('btn-de').className = 'lang-btn' + (lang === 'de' ? ' active' : '');
      document.getElementById('btn-en').className = 'lang-btn' + (lang === 'en' ? ' active' : '');

      var unavailMsg = isMobile ? s.unavailMobile : s.unavailBrowser;
      var unavails = document.querySelectorAll('.platform-unavailable');
      for (var i = 0; i < unavails.length; i++) {
        unavails[i].textContent = unavailMsg;
      }
    }

    var currentLang = (localStorage.getItem('pgame_lang') === 'en') ? 'en' : 'de';
    render(currentLang);
    applyPlatform();
  </script>

</body>
</html>
